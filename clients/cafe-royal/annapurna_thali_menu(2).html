<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annapurna Restaurant | Crafted with Tradition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FBF5EC;
            --header-dark: #1A2E1A;
            --gold: #B8860B;
            --gold-light: #D4A017;
            --rust: #8B3A0F;
            --rust-light: #C14B1A;
            --text-dark: #1C1C1C;
            --text-muted: #6B5B45;
            --card-bg: #FFFFFF;
            --shadow: rgba(90, 50, 10, 0.12);
            --available: #2D6A4F;
            --unavailable: #9B2335;
            --tag-bg: #F3E8D0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
        }

        /* ───── HEADER ───── */
        .site-header {
            background: var(--header-dark);
            color: #F5EDD6;
            text-align: center;
            padding: 44px 20px 36px;
            border-bottom: 5px solid var(--gold);
        }
        .site-header .script-line {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: var(--gold-light);
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.9;
        }
        .site-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            letter-spacing: 5px;
            font-weight: 700;
            line-height: 1.1;
        }
        .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.05rem;
            color: var(--gold-light);
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .meta-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
            font-size: 0.78rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.75;
        }
        .meta-row span { display: flex; align-items: center; gap: 6px; }

        /* ───── SECTION LABEL ───── */
        .section-head {
            text-align: center;
            padding: 36px 20px 4px;
        }
        .section-head h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            color: var(--rust);
            letter-spacing: 1px;
        }
        .divider-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 12px auto 30px;
        }
        .divider-ornament::before, .divider-ornament::after {
            content: "";
            height: 1px;
            width: 80px;
            background: var(--gold);
        }
        .divider-ornament .dot {
            width: 7px; height: 7px;
            background: var(--gold);
            border-radius: 50%;
        }

        /* ───── GRID ───── */
        .thali-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            max-width: 1160px;
            margin: 0 auto 60px;
            padding: 0 24px;
        }

        /* ───── CARD ───── */
        .thali-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 22px var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }
        .thali-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 36px var(--shadow);
        }
        .thali-card.unavailable {
            opacity: 0.68;
        }

        /* Image wrapper */
        .card-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #EDE0CC;
        }
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }
        .thali-card:hover .card-img-wrap img {
            transform: scale(1.04);
        }

        /* Status badge */
        .status-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .badge-available {
            background: var(--available);
            color: #fff;
        }
        .badge-unavailable {
            background: var(--unavailable);
            color: #fff;
        }

        /* Item number badge */
        .item-num {
            position: absolute;
            bottom: 14px;
            left: 14px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--gold);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* Card body */
        .card-body {
            padding: 20px 20px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-body h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--rust);
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.55;
            margin-bottom: 14px;
            flex: 1;
        }

        /* Sub-items */
        .sub-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }
        .sub-tag {
            background: var(--tag-bg);
            color: var(--rust);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 9px;
            border-radius: 10px;
            letter-spacing: 0.3px;
        }

        /* Price row */
        .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #EDE0CC;
            padding-top: 14px;
            margin-top: auto;
        }
        .price {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
        }
        .veg-icon {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--available);
            letter-spacing: 0.5px;
        }
        .veg-dot {
            width: 10px; height: 10px;
            background: var(--available);
            border-radius: 50%;
        }

        /* ───── FOOTER ───── */
        footer {
            text-align: center;
            padding: 34px 20px;
            background: var(--header-dark);
            color: #c8b899;
            font-size: 0.87rem;
            line-height: 1.9;
            border-top: 4px solid var(--gold);
        }
        footer a { color: var(--gold-light); text-decoration: none; font-weight: 700; }
        footer strong { color: #F5EDD6; }

        /* ───── RESPONSIVE ───── */
        @media (max-width: 480px) {
            .thali-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
